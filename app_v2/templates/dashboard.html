{% extends "base.html" %}

{% block content %}
<!-- KPI Strip -->
<div class="gap-3 mb-6" id="kpi-strip"
     :style="'display:grid;grid-template-columns:repeat(' + Math.max(kpis.length, 1) + ',minmax(0,1fr));'">
  <template x-for="kpi in kpis" :key="kpi.label">
    <div class="bg-white rounded-xl border border-line shadow-soft kpi-card">
      <div class="kpi-value" x-text="kpi.value"></div>
      <div class="kpi-label" x-text="kpi.label"></div>
    </div>
  </template>
  <div x-show="kpis.length === 0" :style="'grid-column: 1 / -1;'">
    <div class="bg-white rounded-xl border border-line shadow-soft animate-pulse h-[88px]"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     FB PAGE
     ═══════════════════════════════════════════════════════════════ -->
<template x-if="page === 'fb_page'">
  <div class="space-y-6">

    <!-- ══ Fans Acquisition ══ -->
    <h2 class="section-header">Fans Acquisition</h2>

    <!-- FB Followers Growth — Combined Bar + Line -->
    <div x-show="followersGrowth" class="bg-white rounded-xl border border-line p-6 shadow-soft">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-ink">Followers Growth</h3>
        <div class="flex gap-2 no-print">
          <button class="export-btn" @click="exportFollowersGrowth()">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('chart-followers-growth')">AI</button>
        </div>
      </div>
      <div id="chart-followers-growth" style="height:380px;"></div>
      <div x-show="insightsText['chart-followers-growth'] || insightsLoading['chart-followers-growth']" x-cloak class="ai-insights-panel mt-4">
        <div x-show="insightsLoading['chart-followers-growth']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['chart-followers-growth']"></div>
      </div>
    </div>

    <!-- ══ Overall Page Awareness ══ -->
    <h2 class="section-header">Overall Page Awareness</h2>

    <!-- Total Reach + Reach Funnel — Side by Side -->
    <div class="grid grid-cols-2 gap-4">
      <!-- Total Reach — Line Chart -->
      <div x-show="totalReach" class="bg-white rounded-xl border border-line p-6 shadow-soft">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-ink">Total Reach</h3>
          <div class="flex gap-2 no-print">
            <button class="export-btn" @click="exportTotalReach()">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              Export
            </button>
            <button class="ai-btn" @click="getInsights('chart-total-reach')">AI</button>
          </div>
        </div>
        <div id="chart-total-reach" style="height:380px;"></div>
        <div x-show="insightsText['chart-total-reach'] || insightsLoading['chart-total-reach']" x-cloak class="ai-insights-panel mt-4">
          <div x-show="insightsLoading['chart-total-reach']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
          <div class="prose-chat" x-html="insightsHtml['chart-total-reach']"></div>
        </div>
      </div>

      <!-- Organic Reach Funnel -->
      <div x-show="reachFunnel" class="bg-white rounded-xl border border-line p-6 shadow-soft">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-ink">Organic Reach Funnel</h3>
          <div class="flex gap-2 no-print">
            <button class="export-btn" @click="exportReachFunnel()">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              Export
            </button>
            <button class="ai-btn" @click="getInsights('chart-reach-funnel')">AI</button>
          </div>
        </div>
        <div id="chart-reach-funnel" style="height:380px;"></div>
        <div x-show="insightsText['chart-reach-funnel'] || insightsLoading['chart-reach-funnel']" x-cloak class="ai-insights-panel mt-4">
          <div x-show="insightsLoading['chart-reach-funnel']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
          <div class="prose-chat" x-html="insightsHtml['chart-reach-funnel']"></div>
        </div>
      </div>
    </div>

    <!-- ══ Community ══ -->
    <h2 class="section-header">Community</h2>

    <!-- Total Comments by Sentiment (centered) -->
    <div class="bg-white rounded-xl border border-line p-6 shadow-soft" x-show="sentimentDist.length > 0">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-ink">Total Comments by Sentiment</h3>
        <div class="flex gap-2 no-print">
          <button class="export-btn" @click="exportToExcel(sentimentDist.map(d => ({Sentiment: d.name, Count: d.value})), 'sentiment_dist_' + startDate + '_' + endDate + '.xlsx', 'Sentiment')">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('chart-sentiment-donut')">AI</button>
        </div>
      </div>
      <div class="flex justify-center">
        <div id="chart-sentiment-donut" style="height:320px; width:100%; max-width:500px;"></div>
      </div>
      <div x-show="insightsText['chart-sentiment-donut'] || insightsLoading['chart-sentiment-donut']" x-cloak class="ai-insights-panel mt-4">
        <div x-show="insightsLoading['chart-sentiment-donut']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['chart-sentiment-donut']"></div>
      </div>
    </div>

    <!-- Sentiment by Category (full width) -->
    <div x-show="sentimentByCategory.length > 0" class="bg-white rounded-xl border border-line p-6 shadow-soft">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-ink">Sentiment by Category</h3>
        <div class="flex gap-2 no-print">
          <button class="ai-btn" @click="getInsights('chart-sentiment-category')">AI</button>
        </div>
      </div>
      <div id="chart-sentiment-category" style="height:400px;"></div>
      <div x-show="insightsText['chart-sentiment-category'] || insightsLoading['chart-sentiment-category']" x-cloak class="ai-insights-panel mt-4">
        <div x-show="insightsLoading['chart-sentiment-category']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['chart-sentiment-category']"></div>
      </div>
    </div>

    <!-- Sentiment by Type (full width) -->
    <div x-show="sentimentByType.length > 0" class="bg-white rounded-xl border border-line p-6 shadow-soft">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-ink">Sentiment by Type</h3>
        <div class="flex gap-2 no-print">
          <button class="ai-btn" @click="getInsights('chart-sentiment-type')">AI</button>
        </div>
      </div>
      <div id="chart-sentiment-type" style="height:400px;"></div>
      <div x-show="insightsText['chart-sentiment-type'] || insightsLoading['chart-sentiment-type']" x-cloak class="ai-insights-panel mt-4">
        <div x-show="insightsLoading['chart-sentiment-type']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['chart-sentiment-type']"></div>
      </div>
    </div>

    <!-- FB Key Metrics Table (narrow) -->
    <div x-show="fbKeyMetrics.length > 0" class="bg-white rounded-xl border border-line shadow-soft overflow-hidden">
      <div class="table-header-bar">
        <h3>FB Key Metrics</h3>
        <div class="table-actions no-print">
          <button class="export-btn" @click="exportToExcel(getSortedData(fbKeyMetrics, 'fbKeyMetrics'), 'fb_key_metrics_' + startDate + '_' + endDate + '.xlsx', 'FB Key Metrics')">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('tbl-fb-key-metrics')">AI</button>
        </div>
      </div>
      <div class="dash-table-wrap">
        <table class="dash-table">
          <thead>
            <tr>
              <template x-for="key in Object.keys(fbKeyMetrics[0] || {}).filter(k => !k.startsWith('_'))" :key="key">
                <th @click="sortTable('fbKeyMetrics', key)" class="cursor-pointer hover:text-primary select-none whitespace-nowrap" x-text="key + sortIcon('fbKeyMetrics', key)"></th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="(row, i) in getSortedData(fbKeyMetrics, 'fbKeyMetrics')" :key="i">
              <tr>
                <template x-for="key in Object.keys(fbKeyMetrics[0] || {}).filter(k => !k.startsWith('_'))" :key="key">
                  <td :title="formatCell(row[key])" x-text="formatCell(row[key])"></td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div x-show="insightsText['tbl-fb-key-metrics'] || insightsLoading['tbl-fb-key-metrics']" x-cloak class="ai-insights-panel">
        <div x-show="insightsLoading['tbl-fb-key-metrics']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['tbl-fb-key-metrics']"></div>
      </div>
    </div>

    <!-- ══ Competitor Analysis ══ -->
    <h2 class="section-header" x-text="'Competitor Analysis - ' + startDate.substring(0,7)"></h2>

    <!-- FPK: Competitors Overview — Table -->
    <div x-show="fpkCompetitorsOverview.length > 0" class="bg-white rounded-xl border border-line shadow-soft overflow-hidden">
      <div class="table-header-bar">
        <h3>Competitors Overview</h3>
        <div class="table-actions no-print">
          <button class="export-btn" @click="exportToExcel(getSortedData(fpkCompetitorsOverview.filter(r => {delete r.key; delete r.color; delete r.logo; return true}), 'fpkOverview'), 'competitors_overview_' + startDate + '_' + endDate + '.xlsx', 'Overview')">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('tbl-fpk-overview')">AI</button>
        </div>
      </div>
      <div class="dash-table-wrap">
        <table class="dash-table">
          <thead>
            <tr>
              <template x-for="key in Object.keys(fpkCompetitorsOverview[0] || {}).filter(k => !k.startsWith('_')).filter(k => k !== 'key' && k !== 'color' && k !== 'logo')" :key="key">
                <th @click="sortTable('fpkOverview', key)" class="cursor-pointer hover:text-primary select-none whitespace-nowrap" x-text="key + sortIcon('fpkOverview', key)"></th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="(row, i) in getSortedData(fpkCompetitorsOverview, 'fpkOverview')" :key="i">
              <tr>
                <template x-for="key in Object.keys(fpkCompetitorsOverview[0] || {}).filter(k => !k.startsWith('_')).filter(k => k !== 'key' && k !== 'color' && k !== 'logo')" :key="key">
                  <td :title="formatCell(row[key])" x-text="formatCell(row[key])"></td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <div x-show="insightsText['tbl-fpk-overview'] || insightsLoading['tbl-fpk-overview']" x-cloak class="ai-insights-panel">
        <div x-show="insightsLoading['tbl-fpk-overview']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['tbl-fpk-overview']"></div>
      </div>
    </div>

    <!-- FPK: Competitor Fans Growth Trend — Line Chart -->
    <div x-show="fpkGrowthTrend" class="bg-white rounded-xl border border-line p-6 shadow-soft">
      <div class="table-header-bar" style="padding:0 0 12px 0; border:none;">
        <h3 class="text-sm font-semibold text-ink">Competitor Fans Growth Trend</h3>
        <div class="flex gap-2 no-print">
          <button class="export-btn" @click="exportGrowthTrend()">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('chart-fpk-growth')">AI</button>
        </div>
      </div>
      <div id="chart-fpk-growth" style="height:380px;"></div>
      <div x-show="insightsText['chart-fpk-growth'] || insightsLoading['chart-fpk-growth']" x-cloak class="ai-insights-panel mt-4">
        <div x-show="insightsLoading['chart-fpk-growth']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['chart-fpk-growth']"></div>
      </div>
    </div>

    <!-- FPK: KPI Comparison — Bubble Chart -->
    <div x-show="fpkKpiComparison" class="bg-white rounded-xl border border-line p-6 shadow-soft">
      <div class="table-header-bar" style="padding:0 0 12px 0; border:none;">
        <h3 class="text-sm font-semibold text-ink">Key Performance Indexes Comparison</h3>
        <div class="flex gap-2 no-print">
          <button class="export-btn" @click="exportKpiComparison()">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('chart-fpk-bubble')">AI</button>
        </div>
      </div>
      <div id="chart-fpk-bubble" style="height:400px;"></div>
      <div x-show="insightsText['chart-fpk-bubble'] || insightsLoading['chart-fpk-bubble']" x-cloak class="ai-insights-panel mt-4">
        <div x-show="insightsLoading['chart-fpk-bubble']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['chart-fpk-bubble']"></div>
      </div>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════════════════════════════════
     FB POSTS
     ═══════════════════════════════════════════════════════════════ -->
<template x-if="page === 'fb_posts'">
  <div class="space-y-6">
    <!-- Donut Charts -->
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white rounded-xl border border-line p-6 shadow-soft">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-ink">Posts by Pillar</h3>
          <div class="flex gap-2 no-print">
            <button class="export-btn" @click="exportToExcel(pillarDonut.map(d => ({Pillar: d.name, Posts: d.value})), 'fb_posts_by_pillar_' + startDate + '_' + endDate + '.xlsx', 'Posts by Pillar')">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              Export
            </button>
            <button class="ai-btn" @click="getInsights('chart-pillar-donut')">AI</button>
          </div>
        </div>
        <div id="chart-pillar-donut" style="height:300px;"></div>
        <div x-show="insightsText['chart-pillar-donut'] || insightsLoading['chart-pillar-donut']" x-cloak class="ai-insights-panel mt-4">
          <div x-show="insightsLoading['chart-pillar-donut']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
          <div class="prose-chat" x-html="insightsHtml['chart-pillar-donut']"></div>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-line p-6 shadow-soft">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-ink">Posts by Type</h3>
          <div class="flex gap-2 no-print">
            <button class="export-btn" @click="exportToExcel(typeDonut.map(d => ({Type: d.name, Posts: d.value})), 'fb_posts_by_type_' + startDate + '_' + endDate + '.xlsx', 'Posts by Type')">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              Export
            </button>
            <button class="ai-btn" @click="getInsights('chart-type-donut')">AI</button>
          </div>
        </div>
        <div id="chart-type-donut" style="height:300px;"></div>
        <div x-show="insightsText['chart-type-donut'] || insightsLoading['chart-type-donut']" x-cloak class="ai-insights-panel mt-4">
          <div x-show="insightsLoading['chart-type-donut']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
          <div class="prose-chat" x-html="insightsHtml['chart-type-donut']"></div>
        </div>
      </div>
    </div>

    <!-- Pillar Interactions Bar -->
    <div class="bg-white rounded-xl border border-line p-6 shadow-soft">
      <div class="table-header-bar" style="padding:0 0 12px 0; border:none;">
        <h3 class="text-sm font-semibold text-ink">Interactions by Pillar</h3>
        <div class="flex gap-2 no-print">
          <button class="export-btn" @click="exportToExcel(pillarInteractions.map(d => ({Pillar: d.name, Interactions: d.value})), 'pillar_interactions_' + startDate + '_' + endDate + '.xlsx', 'Pillar')">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('chart-pillar-bar')">AI</button>
        </div>
      </div>
      <div id="chart-pillar-bar" style="height:350px;"></div>
      <div x-show="insightsText['chart-pillar-bar'] || insightsLoading['chart-pillar-bar']" x-cloak class="ai-insights-panel mt-4">
        <div x-show="insightsLoading['chart-pillar-bar']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['chart-pillar-bar']"></div>
      </div>
    </div>

    <!-- Category Interactions Bar -->
    <div class="bg-white rounded-xl border border-line p-6 shadow-soft">
      <div class="table-header-bar" style="padding:0 0 12px 0; border:none;">
        <h3 class="text-sm font-semibold text-ink">Interactions by Category</h3>
        <div class="flex gap-2 no-print">
          <button class="export-btn" @click="exportToExcel(catInteractions.map(d => ({Category: d.name, Interactions: d.value})), 'cat_interactions_' + startDate + '_' + endDate + '.xlsx', 'Category')">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('chart-category-bar')">AI</button>
        </div>
      </div>
      <div id="chart-category-bar" style="height:350px;"></div>
      <div x-show="insightsText['chart-category-bar'] || insightsLoading['chart-category-bar']" x-cloak class="ai-insights-panel mt-4">
        <div x-show="insightsLoading['chart-category-bar']" class="text-xs text-ink-subtle">⏳ Generating insights...</div>
        <div class="prose-chat" x-html="insightsHtml['chart-category-bar']"></div>
      </div>
    </div>

    <!-- FB Wall Post Performance -->
    <div x-show="wallPosts.length > 0" class="bg-white rounded-xl border border-line shadow-soft overflow-hidden">
      <div class="table-header-bar">
        <h3>FB Wall Post Performance</h3>
        <div class="table-actions no-print">
          <span class="table-meta" x-text="wallPosts.length + ' rows'"></span>
          <button class="export-btn" @click="exportToExcel(getSortedData(wallPosts, 'fbWall'), 'fb_wall_posts_' + startDate + '_' + endDate + '.xlsx', 'Wall Posts')">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
          <button class="ai-btn" @click="getInsights('tbl-fb-wall-posts')">AI</button>
        </div>
      </div>
      <div class="dash-table-wrap">
        <table class="dash-table">
          <thead>
            <tr>
              <template x-for="col in wallPostCols" :key="col">
                <th @click="sortTable('fbWall', col)" class="cursor-pointer hover:text-primary select-none whitespace-nowrap" x-text="col + sortIcon('fbWall', col)"></th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-for="(row, i) in getSortedData(wallPosts, 'fbWall')" :key="i">
              <tr>
                <template x-for="col in wallPostCols" :key="col">
                  <td :class="cellClass(col)" :title="formatCell(row[col])" x-text="formatCell(row[col])"></td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
